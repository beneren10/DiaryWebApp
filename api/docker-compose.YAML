version: '3.9'
services:
  diary-mvc:
    image: Beneren10/diary-mvc:0.0.1.RELEASE
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - diary-db
    networks:
      - diary-network

  # The value of 'DB_HOST' we reference in the MVC Dockerfile  
  diary-db:
    image: Beneren10/diary-db:0.0.1.RELEASE
    ports:
      - "5432:5432"
    restart: always
    networks:
      - diary-network
      
networks:
  diary-network: